version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: finance_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: finance_redis
    ports:
      - "6379:6379"

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile   # multi-stage Rust build
    container_name: finance_api
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    ports:
      - "${API_PORT}:8080"
    volumes:
      - uploads:/data/uploads

  worker:
    build:
      context: ./apps/api
      dockerfile: Worker.Dockerfile   # separate Tokio worker binary
    container_name: finance_worker
    depends_on:
      - api
      - postgres
      - redis
    env_file:
      - .env
    volumes:
      - uploads:/data/uploads

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: finance_web
    depends_on:
      - api
    ports:
      - "${WEB_PORT}:80"

  openclaw:
    image: openclaw/openclaw:latest
    container_name: finance_openclaw
    env_file:
      - .env
    volumes:
      - ./apps/openclaw:/app/config
    depends_on:
      - api

volumes:
  postgres_data:
  uploads:
